name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Black
        run: black --check src tests

      - name: isort
        run: isort --check-only --profile black src tests

      - name: Flake8
        run: flake8 src tests --max-line-length=100 --ignore=E501,W503,E203,E704,E402

      - name: Pytest
        run: pytest tests -v --cov=src/swe_agent_lite --cov-report=term-missing
